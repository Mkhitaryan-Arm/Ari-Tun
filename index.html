            border: 4px solid var(--primary); padding: 5px;
            box-shadow: 0 0 40px rgba(255, 126, 95, 0.5);
            animation: float 4s ease-in-out infinite;
            background: white; object-fit: cover;

        header p { font-size: 1.4rem; opacity: 0.7; letter-spacing: 4px; }

        .section-title { text-align: center; font-size: 3rem; margin-bottom: 60px; font-weight: 900; }

        .main-grid {

        }

        .card {

            cursor: pointer; border: 1px solid var(--glass-border);

</head>

// Գեներացնել Գրիդը
function init() {
    const grid = document.getElementById('main-grid');
    for (let key in provinces) {
        const p = provinces[key];
        grid.innerHTML += `
            <div class="card" onclick="openPop('${key}')">
                <img src="${p.img}">
                <div class="card-info">
                    <span>${p.sub}</span>
                    <h3>${p.title}</h3>
                    <p>Տեսնել ավելին →</p>
                </div>
            </div>
        `;
    }
}

function openPop(id) {
    const p = provinces[id];
    const target = document.getElementById('details-content');
    target.innerHTML = `
        <img src="${p.img}" class="hero-img">
        <h1 style="font-size: 3.5rem; margin-bottom: 20px;">${p.title}</h1>
        <p class="details-text">${p.desc}</p>
        <h2 style="color: var(--primary); margin-bottom: 30px;">📍 ՈՒՂՂՈՒԹՅՈՒՆՆԵՐ</h2>
        <div class="sight-box">
            ${p.sights.map(s => `
                <div class="sight-card">
                    <img src="${s.p}" onerror="this.src='https://via.placeholder.com/300'">
                    <h4>${s.n}</h4>
                    <p style="opacity:0.7; font-size:0.9rem;">${s.d}</p>
                    <a href="https://www.google.com/maps/search/${encodeURIComponent(s.n + ' ' + p.title)}" target="_blank" style="color:var(--secondary); text-decoration:none; font-size:0.8rem; display:block; margin-top:10px;">Տեսնել քարտեզում</a>
                </div>
            `).join('')}
        </div>
    `;
    document.getElementById('overlay').style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closePop() {
    document.getElementById('overlay').style.display = 'none';
    document.body.style.overflow = 'auto';
}

function getSurprise() {
    const box = document.getElementById('result-box');
    const mDisplay = document.getElementById('res-marz');
    const pDisplay = document.getElementById('res-place');
    const bDisplay = document.getElementById('res-map-btn');
    
    box.style.display = 'block';
    const keys = Object.keys(provinces);
    let i = 0;

    const interval = setInterval(() => {
        const tempK = keys[Math.floor(Math.random() * keys.length)];
        const tempP = provinces[tempK];
        const tempS = tempP.sights[Math.floor(Math.random() * tempP.sights.length)];
        
        mDisplay.innerText = tempP.title;
        pDisplay.innerText = tempS.n;
        
        if(i++ > 15) {
            clearInterval(interval);
            const finalK = keys[Math.floor(Math.random() * keys.length)];
            const finalP = provinces[finalK];
            const finalS = finalP.sights[Math.floor(Math.random() * finalP.sights.length)];
            
            mDisplay.innerHTML = "✨ " + finalP.title + " ✨";
            pDisplay.innerText = finalS.n;
            pDisplay.style.color = "var(--primary)";
            bDisplay.innerHTML = `<a href="https://www.google.com/maps/search/${encodeURIComponent(finalS.n + ' ' + finalP.title)}" target="_blank" class="maps-link">📍 ՏԵՍՆԵԼ GOOGLE MAPS-ՈՒՄ</a>`;
        }
    }, 80);
}

// Կուրսորի շարժը
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});

window.onload = init;
</script>
